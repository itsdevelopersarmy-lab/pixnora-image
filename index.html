<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>

    <!-- 🔥 Loader Styles -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, #111 0%, #000 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
        font-family: "Segoe UI", sans-serif;
        transition: opacity 0.6s ease, visibility 0.6s;
      }

      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loader-content {
        text-align: center;
        animation: fadeIn 1s ease;
      }

      .spinner {
        width: 70px;
        height: 70px;
        border: 5px solid rgba(255, 255, 255, 0.1);
        border-top: 5px solid #00f0ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 25px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .brand {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 2px;
        margin-bottom: 8px;
      }

      .tagline {
        font-size: 13px;
        color: #aaa;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

    <script type="module" crossorigin src="/assets/index-Bj0eRmnq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-gI7lXGdH.css">
  </head>

  <body>
    <!-- 🔥 START LOADER -->
    <div id="app-loader">
      <div class="loader-content">
        <div class="spinner"></div>
        <h1 class="brand">AI Studio</h1>
        <p class="tagline">Starting backend... please wait</p>
      </div>
    </div>

    <!-- 🔥 React Root -->
    <div id="root"></div>

    <!-- 🔥 Backend Wait Script -->
    <script>
      async function waitForBackend() {
        try {
          await fetch("https://your-backend.onrender.com/health", {
            method: "GET",
            cache: "no-store",
          });

          document.getElementById("app-loader").classList.add("hidden");
        } catch (err) {
          console.log("⏳ Backend waking up...");
          setTimeout(waitForBackend, 2000);
        }
      }

      waitForBackend();
    </script>
  </body>
</html>
